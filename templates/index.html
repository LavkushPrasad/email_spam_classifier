<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMS Spam Classifier</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sc-root">

    <!-- Header -->
    <div class="sc-header">
      <div class="sc-logo">🛡️</div>
      <div class="sc-title-group">
        <h1>Email Spam Classifier</h1>
        <p>AI-powered message analysis</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="sc-stats">
      <div class="sc-stat">
        <div class="sc-stat-label">
          <span class="sc-stat-dot" style="background:#6366f1;"></span> Analyzed
        </div>
        <div class="sc-stat-val" id="stat-total">0</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-label">
          <span class="sc-stat-dot" style="background:#ef4444;"></span> Spam
        </div>
        <div class="sc-stat-val" id="stat-spam">0</div>
      </div>
      <div class="sc-stat">
        <div class="sc-stat-label">
          <span class="sc-stat-dot" style="background:#14b8a6;"></span> Ham
        </div>
        <div class="sc-stat-val" id="stat-ham">0</div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="sc-input-area" id="input-area">
      <div class="sc-input-top">
        <span class="sc-input-badge">SMS MESSAGE</span>
        <span class="sc-char-count" id="char-count">0 / 2000</span>
      </div>
      <textarea
        class="sc-textarea"
        id="message"
        placeholder="Paste or type your SMS message here..."
        maxlength="2000"
        aria-label="SMS message input"
      ></textarea>
    </div>

    <!-- Action Buttons -->
    <div class="sc-actions">
      <button class="sc-btn-primary" onclick="predictSpam()" id="predict-btn">
        <i class="ti ti-shield-check"></i>
        Analyze Message
      </button>
      <button class="sc-btn-clear" onclick="clearInput()" title="Clear">
        <i class="ti ti-x"></i>
      </button>
    </div>

    <!-- Result -->
    <div id="result"></div>

    <!-- History -->
    <div class="sc-history" id="history-section" style="display:none;">
      <div class="sc-history-title">Recent scans</div>
      <div class="sc-history-list" id="history-list"></div>
    </div>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
